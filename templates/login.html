<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Insight Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajustes personalizados para lograr el diseño exacto de la imagen */
        .bg-login-image {
            /* Puedes cambiar esta URL por la ruta de una imagen tuya en local, 
               o dejar esta de Unsplash relacionada con tecnología/diseño */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            min-height: 100vh;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0 overflow-hidden">
        <div class="row g-0 login-container">
            
            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white px-5">
                <div class="w-100" style="max-width: 400px;">
                    
                    <div class="mb-4">
                        <h2 class="fw-bold text-dark mb-1">¡Bienvenido de nuevo!</h2>
                        <p class="text-muted">Por favor introduce tus datos para ingresar al sistema.</p>
                    </div>

                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-danger text-center p-2 mb-3" style="font-size: 0.9rem;">
                              ⚠️ {{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form action="/login" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Usuario</label>
                            <input type="text" name="usuario" class="form-control form-control-lg bg-light border-0" 
                                   placeholder="Introduce tu usuario" required style="font-size: 1rem;">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Contraseña</label>
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-0" 
                                   placeholder="••••••••" required style="font-size: 1rem;">
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.9rem;">
                                    Recordarme
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark btn-lg w-100 fw-semibold shadow-sm mb-3" style="background-color: #111; border: none;">
                            Entrar al Sistema
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small">⚙️ Insight Studio Admin &copy; 2026</p>
                    </div>

                </div>
            </div>

            <div class="col-md-6 d-none d-md-block bg-login-image">
                </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
